backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Productos"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Categoría", name: "category", widget: "select", options: ["beauty", "kitchen", "devices", "pets", "computo", "baby", "auto", "viaje", "home", "tech"] }
      - { label: "Emoji", name: "emoji", widget: "string", required: false }
      - { label: "Destacado", name: "destacado", widget: "boolean", default: false }
      - { label: "Rating", name: "rating", widget: "string", required: false }
      - { label: "Reseñas", name: "reviews", widget: "string", required: false }
      - { label: "Badge", name: "salesBadge", widget: "string", required: false }
      - { label: "Descripción", name: "desc", widget: "text" }
      - { label: "Imagen", name: "image", widget: "string", required: false }
      - { label: "Enlace Amazon", name: "amazonLink", widget: "string" }

  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Categoría", name: "category", widget: "string" }
      - { label: "Imagen destacada", name: "featured_image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Páginas"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Contenido", name: "body", widget: "markdown" }
